<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso Clientes</title>

  <style>
    :root {
      --azul: #2c3e50;
      --dorado: #c9a44c;
      --gris-fondo: #f7f7f7;
      --gris-borde: #e0e0e0;
      --texto: #333;
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--gris-fondo);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 40px;
      border-radius: 14px;
      width: 350px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
      border-top: 6px solid var(--dorado);
      text-align: center;
    }

    h2 {
      color: var(--azul);
      margin-bottom: 25px;
      font-size: 24px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid var(--gris-borde);
      font-size: 15px;
    }

    input:focus {
      outline: none;
      border-color: var(--dorado);
      box-shadow: 0 0 4px rgba(201,164,76,0.4);
    }

    .btn-login {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: var(--azul);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-login:hover {
      background: #1b2836;
    }

    .mensaje-error {
      margin-top: 15px;
      color: #b52b27;
      font-size: 14px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Acceso Clientes</h2>

    <input type="number" id="codigo" placeholder="Código de cliente">

    <button class="btn-login" onclick="login()">Entrar</button>

    <p id="error" class="mensaje-error">Código incorrecto</p>
  </div>

  <script>
    async function login() {
      const codigo = document.getElementById("codigo").value.trim();
      const errorMsg = document.getElementById("error");

      if (!codigo) {
        errorMsg.textContent = "Introduce tu código";
        errorMsg.style.display = "block";
        return;
      }

      const resp = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ codigo })
      });

      const data = await resp.json();

      if (data.success) {
        localStorage.setItem("cliente", JSON.stringify(data.cliente));
        window.location.href = "/pedido.html";
      } else {
        errorMsg.textContent = "Código incorrecto";
        errorMsg.style.display = "block";
      }
    }
  </script>

</body>
</html>
